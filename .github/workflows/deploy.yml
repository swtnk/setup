name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Shellcheck
        run: shellcheck claude/vscode/install claude/vscode/test.sh

      - name: Syntax check installer
        run: bash -n claude/vscode/install

      - name: Verify installer checksum
        run: sha256sum -c claude/vscode/install.sha256

      - name: Run test in sandbox
        run: bash claude/vscode/test.sh --force --no-detect

      - name: Test --copilot flag
        run: bash claude/vscode/test.sh --force --no-detect --copilot

      - name: Test --global flag
        run: bash claude/vscode/test.sh --force --no-detect --global

      - name: Test --global --copilot (copilot skipped)
        run: bash claude/vscode/test.sh --force --no-detect --global --copilot

  deploy:
    needs: validate
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
